<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
body {
    background-image: url('1.png');
    background-size: cover;
    margin: 0;
    font-family: sans-serif;
}

ul {
    list-style-type: none;
    margin: 0;
    padding: 15px;
    overflow: hidden;
 
}

li {
    float: left;
}

li a {
    color: aliceblue;
    text-decoration: none;
    padding: 12px 12px;
    text-align: center;
    display: block;
    font-size: 1rem;
}

li a:hover {
    color: grey;
}

.container {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 25px;
    margin-left: 15%;
    background-color: rgb(0, 0, 0);
    height: 590px;
    width: 1000px;
    border-color: aliceblue;
    border-style: solid;
    padding: 20px;
    box-sizing: border-box;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.container:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
}


img {
    height: 450px;
    width: 400px;
    margin-left: 10%;
}
h1 {
    color: rgb(255, 255, 255);
    font-size: 120px;
    font-family: sans-serif;
    margin-left: 02%;
    margin-top: 1%;
    height: 230px;
}

h1 .blue {
    color: rgb(55, 138, 247);
}

.icon-container {
    display: inline-block;
    margin-left: 5%
}

.icon-container a {
    color: aliceblue;
    font-size: 50px;
    text-decoration: none;
  
}

.icon-container a:hover {
    color: grey;
}


@media (max-width: 1024px) {
    .container {
        width: 90%;
        margin-left: 2.5%;
        flex-direction: column;
        align-items: center;
        height: auto;
    }

    img {
        width: 80%;
        max-width: 300px;
        margin-bottom: 10%;
        margin-left: 0;
    }

    h1 {
        font-size: 3rem;
        height: 70px;
        height: 60px;
    }

    .icon-container a {
        font-size: 10px;
    }
}

@media (max-width: 768px) {
    ul {
        padding: 10px;
    }

    li {
        float: none;
        text-align: center;
    }

    li a {
        padding: 8px;
        font-size: 0.9rem;
    }

    .container {
        width: 95%;
    }

    img {
        width: 100%;
        max-width: 250px;
        margin-bottom: 10%;
    }

    h1 {
        font-size: 2.5rem;
        height: 60px;
    }

    .icon-container a {
        font-size: 10px;
    }
}

@media (max-width: 480px) {
    h1 {
        font-size: 2rem;
    }

    .icon-container a {
        font-size: 1rem;
    }

    img {
        width: 100%;
        max-width: 200px;
    }
}
</style>
</head>
<body>
<ul>
    <li><a class="active" href="portfolio.html">Home</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="about.html">About Me</a></li>
</ul>
<div class="container">
    <div>
        <h1><div>Niall</div><div class="blue">Dcunha</div></h1>
        <div class="icon-container"><a href="https://github.com/Niall1985"><i class="fa fa-github"></i></a></div>
        <div class="icon-container"><a href="https://in.linkedin.com/in/niall-d-cunha-4b02a6293"><i class="fa fa-linkedin"></i></a></div>
        <div class="icon-container"><a href="#instagram"><i class="fa fa-instagram"></i></a></div>
    </div>
    <br>
    <img src="portfolio.jpg" alt="My Profile">
</div>
</body>
</html>
