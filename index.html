    padding: 20px;

.container:hover {

}

img {
    height: 450px;
    width: 400px;
    margin-left: 10%;

h1 {

    color: aliceblue;
    font-size: 50px;
    text-decoration: none;

.icon-container a:hover {

@media (max-width: 1024px) {
    .container {
        width: 90%;

        width: 80%;
